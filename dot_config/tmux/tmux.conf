# ── 前缀键改为 Ctrl+a ─────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── 基础设置 ──────────────────────────────────────
set -g mouse on
set -g base-index 1
set -g history-limit 10000
set -sg escape-time 0
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ── 分屏快捷键 ────────────────────────────────────
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
# 兼容部分老习惯，保留 % 和 "，但也让它们继承当前路径
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# ── 面板切换（交由 vim-tmux-navigator 处理）───────
# 移除了原本的 bind h/j/k/l，因为 vim-tmux-navigator 会自动接管 C-h/j/k/l

# ── 状态栏 ────────────────────────────────────────
set -g status-style bg=default
set -g status-left "#[bold]  #S "
set -g status-right "%H:%M %d-%b"
set -g window-status-current-format "#[bold,underscore] #I:#W "

# ── 插件管理 ──────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator' # 无缝切换 Neovim 和 Tmux 面板
set -g @plugin 'tmux-plugins/tmux-yank'         # 支持在 Tmux 中复制到系统剪贴板

# 自动恢复会话
set -g @continuum-restore 'on'
# 保持恢复 pane 内容
set -g @resurrect-capture-pane-contents 'on'

# 初始化 TMUX 插件管理器 (保持在最底部)
# 如果 TPM 未安装，则自动克隆并安装插件
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
