# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  数据驱动的包管理配置
#  修改此文件将自动触发 chezmoi 重新运行对应的安装脚本
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ── 1. 基础系统工具（通过 apt/pacman/brew 安装）────────
cli:
  - git
  - zsh
  - curl
  - ca-certificates
  - open-vm-tools          # VMware 增强工具
  - virtualbox-guest-utils # VirtualBox 增强工具

# ── 2. 安装指令定义 ──────────────────────────────────
# 定义不同平台/包管理器的安装前缀
install_commands:
  darwin: "brew install --cask"
  arch: "yay -S --needed --noconfirm"
  debian: "sudo apt-get install -y"
  winget: "winget install --silent --accept-source-agreements --accept-package-agreements"

# ── 3. GUI 软件清单及平台映射 ───────────────────────
# key: 逻辑名称
# value: 各平台对应的真实包名
gui_apps:
  # --- 输入法组件 (仅在 Linux 桌面有效) ---
  fcitx5:
    arch: fcitx5 fcitx5-chinese-addons fcitx5-configtool fcitx5-gtk fcitx5-qt
    debian: fcitx5 fcitx5-chinese-addons fcitx5-config-qt fcitx5-frontend-gtk3 fcitx5-frontend-qt5
  
  # --- 常用软件 ---
  vscode:
    darwin: visual-studio-code
    arch: visual-studio-code-bin
    debian: code
    winget: Microsoft.VisualStudioCode
  docker:
    darwin: docker
    arch: docker
    debian: docker-ce
    winget: Docker.DockerDesktop
  wezterm:
    darwin: wezterm
    arch: wezterm
    winget: wez.wezterm
  raycast:
    darwin: raycast
  rectangle:
    darwin: rectangle
  iterm2:
    darwin: iterm2
  timeshift:
    arch: timeshift
