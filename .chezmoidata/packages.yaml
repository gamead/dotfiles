# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
#  数据驱动的包管理配置
#  修改此文件将自动触发 chezmoi 重新运行对应的安装脚本
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ── 1. 基础系统工具 ────────
# 逻辑名称: { 平台: 包名 }
cli:
  # git:      { common: git }
  # zsh:      { common: zsh }
  # curl:     { common: curl }
  # ca:       { common: ca-certificates }
  # starship: { common: starship }
  # ripgrep:  { common: ripgrep }
  # fzf:      { common: fzf }
  # tmux:     { common: tmux }
  # bat:      { arch: bat, debian: bat, darwin: bat }
  # fd:       { arch: fd, debian: fd-find, darwin: fd }
  # vm-tools: { arch: open-vm-tools, debian: open-vm-tools }
  # vbox-utils: { arch: virtualbox-guest-utils, debian: virtualbox-guest-utils }

# ── 2. 安装指令定义 ──────────────────────────────────
# 定义不同平台/包管理器的安装前缀
install_commands:
  darwin: "brew install --cask"
  arch: "yay -S --needed --noconfirm"
  debian: "sudo apt-get install -y"
  winget: "winget install --silent --accept-source-agreements --accept-package-agreements"

# ── 3. GUI 软件清单及平台映射 ───────────────────────
# key: 逻辑名称
# value: 各平台对应的真实包名
gui_apps:
  # --- 输入法组件 (仅在 Linux 桌面有效) ---
  fcitx5:
    # arch: fcitx5 fcitx5-chinese-addons fcitx5-configtool fcitx5-gtk fcitx5-qt fcitx5-im fcitx5-rime rime-ice fcitx5-pinyin-zhwiki fcitx5-material-color
    # debian: fcitx5 fcitx5-chinese-addons fcitx5-config-qt fcitx5-frontend-gtk3 fcitx5-frontend-qt5 fcitx5-rime
    arch: fcitx5-im fcitx5-chinese-addons fcitx5-rime rime-ice fcitx5-pinyin-zhwiki fcitx5-material-color
    debian: fcitx5-im fcitx5-chinese-addons fcitx5-rime rime-ice fcitx5-pinyin-zhwiki fcitx5-material-color
  
  gnome-tray:
    arch: gnome-shell-extension-appindicator
    debian: gnome-shell-extension-appindicator
  
  # --- 常用软件 ---
  vscode:
    darwin: visual-studio-code
    arch: visual-studio-code-bin
    debian: code
    winget: Microsoft.VisualStudioCode
  docker:
    darwin: docker
    arch: docker
    debian: docker-ce
    winget: Docker.DockerDesktop
